apiVersion: v1
kind: ConfigMap
metadata:
  name: notifications-api-config
data:
  ASPNETCORE_ENVIRONMENT: Production
  RabbitMq__Host: rabbitmq
  RabbitMq__Port: "5672"
  RabbitMq__VirtualHost: /
  RabbitMq__UserCreatedQueue: notifications-user-created
  RabbitMq__PaymentProcessedQueue: notifications-payment-processed
